<html lang="en">
<head>

  <meta name="theme-color" content="#0B1120" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jan Manch Gujarat - Real Public Edition</title>

  <script src="tailwind.js"></script>

      theme: {
        extend: {
          colors: {
            brand: { 500: '#FF6B00', 600: '#E05D00' },
            dark: { 900: '#0B1120', 800: '#151E32', 700: '#1E293B' }

          animation: { 'marquee': 'marquee 25s linear infinite' },
          keyframes: { marquee: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } } }

      }
    };
  </script>

    input, textarea { user-select: text !important; -webkit-user-select: text !important; }
    
    body { 
      background-color: #0B1120; 
      background-image: radial-gradient(circle at 50% 0%, #151E32 0%, #0B1120 70%);
      background-attachment: fixed; color: #F8FAFC; 
    }

    /* 🌟 PC WIDE SCREEN CONTAINER 🌟 */
    #app-frame {
      max-width: 1200px; /* Wide screen limit for PC readability */
      margin: 0 auto; min-height: 100vh;
      position: relative;
    }

    /* 🌟 TOPBAR RESPONSIVE 🌟 */
    #topbar {
      position: fixed; top: 0; width: 100%; left: 0; z-index: 50;
      background: rgba(11, 17, 32, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 107, 0, 0.2); padding-top: var(--safe-top);
    }
    
    .topbar-content {
      max-width: 1200px; margin: 0 auto;
    }

    #main-content {
      min-height: 100vh;
      padding-top: calc(90px + var(--safe-top)); 
      padding-bottom: calc(60px + var(--safe-bottom));
    }

    .project-card {
      background: rgba(21, 30, 50, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); overflow: hidden; height: fit-content;
    }
    
    .status-line { height: 4px; width: 100%; }
    .bg-neon-green { background: #22C55E; box-shadow: 0 0 10px rgba(34,197,94,0.5); }
    .bg-neon-yellow { background: #EAB308; box-shadow: 0 0 10px rgba(234,179,8,0.5); }
    .bg-neon-red { background: #EF4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }
    .bg-neon-orange { background: #F97316; box-shadow: 0 0 10px rgba(249,115,22,0.5); }
    .bg-neon-purple { background: #A855F7; box-shadow: 0 0 10px rgba(168,85,247,0.5); }

    .ignored-badge {
      background: rgba(239, 68, 68, 0.15); border: 1px dashed #EF4444; color: #FCA5A5;
      padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 800;
      display: flex; gap: 6px; align-items: center; margin-bottom: 12px;
    }

    .tab-container {
      display: flex; overflow-x: auto; gap: 8px; padding-bottom: 4px;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .tab-container::-webkit-scrollbar { display: none; }
    
    .tab-btn {
      flex: 0 0 auto; padding: 10px 16px; font-size: 13px; font-weight: 800; border-radius: 12px;
      background: rgba(30, 41, 59, 0.5); color: #94A3B8; transition: all 0.2s; border: 1px solid transparent; cursor: pointer;
    }
    .tab-btn.active { background: rgba(255,107,0,0.15); color: #FF6B00; border-color: rgba(255,107,0,0.3); }

    .lang-pill { padding: 4px 12px; font-size: 11px; font-weight: 800; border-radius: 999px; transition: 0.2s; cursor: pointer; }
    .lang-pill.active { background: #FF6B00; color: #fff; }
    .lang-pill:not(.active) { color: #94A3B8; }

    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 800;
      background: rgba(30, 41, 59, 0.8); transition: transform 0.1s; cursor: pointer;
    }
    .voted-up { background: rgba(34, 197, 94, 0.2) !important; color: #4ADE80; border: 1px solid rgba(34,197,94,0.3); }
    .voted-down { background: rgba(239, 68, 68, 0.2) !important; color: #F87171; border: 1px solid rgba(239,68,68,0.3); }

    .drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .drawer.open { max-height: 500px; }

    .live-ticker-wrap {
      background: rgba(239, 68, 68, 0.1); border-bottom: 1px solid rgba(239, 68, 68, 0.3);
      display: flex; overflow: hidden; white-space: nowrap; padding: 6px 0; align-items: center;
    }
    .ticker-label {
      background: #EF4444; color: white; font-weight: 900; font-size: 10px; padding: 2px 8px;
      border-radius: 4px; margin-left: 12px; margin-right: 8px; z-index: 10;
    }

    @media (min-width: 768px) {
      .tab-panel:not(.hidden) {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        align-items: start;
      }
      .project-card { margin-bottom: 0; }

</head>

      </div>

        <button class="lang-pill" onclick="setLang('hi')">हिंदी</button>
        <button class="lang-pill" onclick="setLang('hl')">Hingl</button>
      </div>
    </div>

      <div class="w-full overflow-hidden relative">

      </div>
    </div>
  </div>
</nav>

  </main>
</div>

    ],
    ongoing: [

    ],
    jhol: [
      {
        id: "s_j2", title: { en: "₹400 Crore Outer Ring Road Pothole Scam", gu: "₹400 કરોડ આઉટર રિંગ રોડ ખાડા કૌભાંડ", hi: "₹400 करोड़ आउटर रिंग रोड गड्ढा घोटाला", hl: "₹400 Crore Outer Ring Road Pothole Scam" },
        year: "Recent Update", category: "jhol", upvotes: 9450, downvotes: 67,

      },
      { id: "s_j1", category: "jhol", title: { en: "BRTS Ghost Buses Scam", gu: "BRTS કાગળ પર ચાલતી બસ કૌભાંડ", hi: "BRTS कागज़ी बस घोटाला", hl: "BRTS Ghost Buses Jhol" }, year: "2019–2021", upvotes: 3100, downvotes: 89, desc: { en: "CAG audit found 30% of buses running 'on app' were actually parked in depots.", gu: "CAG ઓડિટમાં ખબર પડી કે એપ પર ચાલતી 30% બસો ખરેખર ડેપોમાં બંધ હતી.", hi: "CAG ने पकड़ा कि ऐप पर चलने वाली 30% बसें असल में डिपो में खड़ी थीं।", hl: "CAG ne pakda ki app pe chalne wali 30% buses actually yard me khadi thi." } }

  },
  Ahmedabad: { mp: { name: "Hasmukh Patel / Dinesh Makwana", party: "BJP (Elected 2024)" }, tickerAlerts:[], daily: [], ignored: [], completed: [], ongoing: [], pending: [], jhol: [] },
  Vadodara: { mp: { name: "Dr. Hemang Joshi", party: "BJP (Elected 2024)" }, tickerAlerts:[], daily: [], ignored: [], completed: [], ongoing: [], pending: [], jhol: [] },
  Rajkot: { mp: { name: "Parshottam Rupala", party: "BJP (Elected 2024)" }, tickerAlerts:[], daily: [], ignored: [], completed: [], ongoing: [], pending: [], jhol: [] },
  Bhavnagar: { mp: { name: "Nimuben Bambhaniya", party: "BJP (Elected 2024)" }, tickerAlerts:[], daily: [], ignored: [], completed: [], ongoing: [], pending: [], jhol: [] }
};

let state = { lang: "en", city: null, activeTab: "daily", userVotes: {} };

function setLang(lang) {
  state.lang = lang;
  document.querySelectorAll(".lang-pill").forEach(b => {
    b.classList.remove("active");
    if(b.textContent.trim() === {en:"EN",gu:"ગુજ",hi:"हिंदी",hl:"Hingl"}[lang]) b.classList.add("active");
  });
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  if (state.city) renderDashboard(state.city);
}

function t(key) { return i18n[state.lang][key] || i18n.en[key] || key; }
function tObj(obj) { return obj[state.lang] || obj.en || ""; }

function onCitySelect(city) {
  if (!city) return;
  state.city = city;
  document.getElementById("city-screen").classList.add("hidden");
  document.getElementById("city-dashboard").classList.remove("hidden");
  
  const tickerWrap = document.getElementById("live-ticker");
  if(cityData[city] && cityData[city].tickerAlerts && cityData[city].tickerAlerts.length > 0) {
    tickerWrap.classList.remove("hidden");
    const alerts = cityData[city].tickerAlerts.map(a => tObj(a)).join(" &nbsp; | &nbsp; ");
    document.getElementById("ticker-text").innerHTML = alerts + " &nbsp; | &nbsp; " + alerts;
  } else {
    tickerWrap.classList.add("hidden");
  }

  renderDashboard(city);
}

function goBack() {
  state.city = null;
  document.getElementById("city-dashboard").classList.add("hidden");
  document.getElementById("city-screen").classList.remove("hidden");
  document.getElementById("city-select").value = "";
  document.getElementById("live-ticker").classList.add("hidden");
}

function switchTab(tabName) {
  state.activeTab = tabName;
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`tab-${tabName}`).classList.remove("hidden");
  document.getElementById(`btn-${tabName}`).classList.add("active");
}

function renderDashboard(city) {
  const data = cityData[city] || { daily: [], ignored: [], completed: [], ongoing: [], pending: [], jhol: [] };
  document.getElementById("dash-city-name").textContent = city;

  const mpCard = document.getElementById("mp-info-card");
  if (data.mp) {
    mpCard.classList.remove("hidden");
    document.getElementById("mp-name").textContent = data.mp.name;
    document.getElementById("mp-party").textContent = data.mp.party;
  } else {
    mpCard.classList.add("hidden");
  }

  document.getElementById("tab-daily").innerHTML = data.daily.map(p => buildCard(p)).join("");
  document.getElementById("tab-ignored").innerHTML = data.ignored.map(p => buildCard(p)).join("");
  document.getElementById("tab-completed").innerHTML = data.completed.map(p => buildCard(p)).join("");
  document.getElementById("tab-ongoing").innerHTML = data.ongoing.map(p => buildCard(p)).join("");
  document.getElementById("tab-pending").innerHTML = data.pending.map(p => buildCard(p)).join("");
  document.getElementById("tab-jhol").innerHTML = data.jhol.map(p => buildCard(p)).join("");
  
  switchTab(state.activeTab);
}

function buildCard(p) {
  const saved = state.userVotes[p.id] || { up: p.upvotes, down: p.downvotes, status: null };
  const lineClass = p.category === 'completed' ? 'bg-neon-green' : p.category === 'ongoing' ? 'bg-neon-yellow' : p.category === 'pending' ? 'bg-neon-red' : p.category === 'ignored' ? 'bg-neon-orange' : p.category === 'daily' ? 'bg-red-600' : 'bg-neon-purple';

  return `
  <div class="project-card" id="card-${p.id}">
    <div class="status-line ${lineClass}"></div>
    <div class="p-5">
      
      ${p.category === 'ignored' ? `
        <div class="ignored-badge">
          <span>🙉</span> <span>${t("ignoredTag")}</span>
        </div>
      ` : ''}

      <div class="flex justify-between items-start mb-3">
        <h4 class="font-black text-white text-lg leading-tight w-3/4">${tObj(p.title)}</h4>
        <div class="text-[10px] font-bold text-slate-400 bg-dark-900 px-2 py-1 rounded-md text-right whitespace-nowrap">${p.year}</div>
      </div>

      <p class="text-[15px] text-slate-300 leading-relaxed font-medium mb-4 mt-2">${tObj(p.desc)}</p>
      
      ${['completed', 'ongoing', 'pending'].includes(p.category) ? `
      <div class="mb-4 bg-dark-900/60 p-3 rounded-lg">
        <div class="flex justify-between text-[11px] font-bold mb-2"><span class="text-slate-400">Completion Status</span><span class="text-white">${p.progress}%</span></div>
        <div class="w-full bg-dark-900 h-2.5 rounded-full overflow-hidden border border-white/5"><div class="${lineClass} h-full rounded-full" style="width: ${p.progress}%"></div></div>
      </div>` : ""}

      ${p.category === 'pending' && p.delayReason ? `
      <div class="bg-red-500/10 border border-red-500/20 p-3 rounded-xl mb-4">
        <div class="text-red-400 text-[10px] font-black uppercase tracking-wider mb-1">${t("reasonLabel")}</div>
        <div class="text-red-200 text-[13px] font-medium leading-relaxed">${tObj(p.delayReason)}</div>
      </div>` : ""}
      
    </div>
    
    <div class="px-5 py-3.5 bg-dark-900/50 border-t border-white/5 flex items-center justify-between">
      <div class="flex gap-3 w-full pr-4">
        <button class="action-btn ${saved.status === 'up' ? 'voted-up' : ''}" onclick="castVote('${p.id}', 'up')">
          ${t("upvote")} <span class="opacity-70">${saved.up}</span>
        </button>
        <button class="action-btn ${saved.status === 'down' ? 'voted-down' : ''}" onclick="castVote('${p.id}', 'down')">
          ${t("downvote")} <span class="opacity-70">${saved.down}</span>
        </button>
      </div>
      <button class="w-11 h-11 flex-shrink-0 rounded-full bg-brand-500 text-white flex items-center justify-center shadow-lg active:scale-90 transition-transform cursor-pointer" onclick="toggleDrawer('${p.id}')">
        📸
      </button>
    </div>

    <div class="drawer bg-dark-800" id="drawer-${p.id}">
      <div class="p-5 border-t border-white/5 space-y-4">
        <div class="text-[11px] font-black text-brand-500 uppercase tracking-widest">${t("proofLabel")}</div>
        <textarea id="text-${p.id}" rows="2" class="w-full bg-dark-900 border border-white/10 rounded-xl p-3 text-sm text-white outline-none focus:border-brand-500 transition-colors" placeholder="${t("writeProof")}"></textarea>
        <div class="py-4 text-center border-2 border-dashed border-white/20 rounded-xl cursor-pointer hover:bg-white/5 transition" onclick="showToast('📸 Open Phone Camera...')">
          <div class="text-xs font-bold text-slate-400 mt-1">📸 ${t("uploadBtn")}</div>
        </div>
        <button onclick="postProof('${p.id}')" class="w-full bg-white text-dark-900 font-black text-sm py-3.5 rounded-xl active:scale-95 shadow-lg transition-transform cursor-pointer">${t("submitProof")}</button>
      </div>
    </div>
  </div>`;
}

function castVote(pId, type) {
  if (!state.userVotes[pId]) {
    const data = cityData[state.city];
    const item = [...data.daily, ...data.ignored, ...data.completed, ...data.ongoing, ...data.pending, ...data.jhol].find(i => i.id === pId);
    state.userVotes[pId] = { up: item.upvotes, down: item.downvotes, status: null };
  }
  const v = state.userVotes[pId];
  if(v.status === type) { type === 'up' ? v.up-- : v.down--; v.status = null; }
  else { if(v.status) { type === 'up' ? v.down-- : v.up--; }; type === 'up' ? v.up++ : v.down++; v.status = type; }
  renderDashboard(state.city);
  showToast("✅ Public Opinion Registered!");
}

function toggleDrawer(pId) { document.getElementById(`drawer-${pId}`).classList.toggle("open"); }
function postProof(pId) { document.getElementById(`text-${pId}`).value = ""; toggleDrawer(pId); showToast("🚀 Proof uploaded live."); }
function showToast(m) { const t = document.getElementById("toast"); t.textContent = m; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 2500); }

window.addEventListener("DOMContentLoaded", () => { setLang("en"); });
</script>
